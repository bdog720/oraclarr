name: Publish to PyPI + MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI Trusted Publishing + MCP Registry OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG="$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "tag=$TAG pyproject=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG != pyproject $PKG — bump pyproject.toml"; exit 1; }

      - name: Run tests
        run: uv run pytest -q

      - name: Build package
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Wait for PyPI to index the release
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/oraclarr-mcp/$VERSION/json" >/dev/null 2>&1; then
              echo "oraclarr-mcp $VERSION is live on PyPI"; exit 0
            fi
            echo "waiting for PyPI to index $VERSION ..."; sleep 10
          done
          echo "::error::timed out waiting for PyPI"; exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Sync server.json version to tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          tmp="$(mktemp)"
          jq --arg v "$VERSION" '.version = $v | (.packages[].version) = $v' server.json > "$tmp" && mv "$tmp" server.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
